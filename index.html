<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎤 Karaoke Menu Pizze</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #E8302A;
      --yellow: #F5C842;
      --green: #2DB37A;
      --blue: #3A8BCD;
      --purple: #9B59B6;
      --orange: #F07C2A;
      --bg: #FFF9F0;
      --card: #FFFFFF;
      --text: #2C1A0E;
      --muted: #8B6A50;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      background: var(--red);
      color: white;
      text-align: center;
      padding: 28px 16px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 12px rgba(232,48,42,0.3);
    }
    header h1 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.8rem, 6vw, 2.8rem);
      letter-spacing: 1px;
    }
    header p {
      font-size: 0.9rem;
      opacity: 0.9;
      margin-top: 4px;
    }

    /* Instagram banner */
    .insta-banner {
      background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
      padding: 18px 20px;
      text-align: center;
    }
    .insta-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: white;
      color: #cc2366;
      text-decoration: none;
      border-radius: 50px;
      padding: 13px 24px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.15rem;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
      transition: transform .2s, box-shadow .2s;
      width: 100%;
      max-width: 400px;
      justify-content: center;
    }
    .insta-link:hover, .insta-link:active { transform: scale(1.03); box-shadow: 0 6px 22px rgba(0,0,0,0.25); }
    .insta-icon { font-size: 1.5rem; flex-shrink: 0; }
    .insta-text { display: flex; flex-direction: column; text-align: left; line-height: 1.2; }
    .insta-main { font-size: 1.1rem; }
    .insta-sub { font-size: 0.72rem; font-family: 'Nunito', sans-serif; font-weight: 700; color: #888; margin-top: 1px; }

    /* Filter tabs — vertical stack */
    .tabs {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 14px 16px;
      background: #FFF3E8;
      border-bottom: 2px solid #F0DCC8;
    }
    .tab {
      width: 100%;
      padding: 12px 20px;
      border-radius: 14px;
      border: 2px solid #E8C9A8;
      background: white;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all .2s;
      color: var(--text);
      text-align: left;
    }
    .tab.active, .tab:hover { background: var(--red); color: white; border-color: var(--red); }

    /* Search */
    .search-wrap {
      padding: 12px 16px;
      background: #FFF3E8;
    }
    .search-wrap input {
      width: 100%;
      padding: 10px 16px;
      border-radius: 24px;
      border: 2px solid #E8C9A8;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      outline: none;
      background: white;
      color: var(--text);
    }
    .search-wrap input:focus { border-color: var(--red); }

    /* Section headers */
    .section-title {
      font-family: 'Fredoka One', cursive;
      font-size: 1.3rem;
      padding: 20px 16px 8px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 2px;
      background: linear-gradient(to right, #E8C9A8, transparent);
      border-radius: 2px;
    }

    /* Cards grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      padding: 0 16px 16px;
    }

    .card {
      background: var(--card);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 3px 12px rgba(0,0,0,0.08);
      transition: transform .2s, box-shadow .2s;
      border: 2px solid transparent;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }

    .card-header {
      padding: 16px 18px 12px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .pizza-emoji {
      font-size: 2.2rem;
      flex-shrink: 0;
      line-height: 1;
    }
    .card-title-wrap {}
    .pizza-name {
      font-family: 'Fredoka One', cursive;
      font-size: 1.25rem;
      line-height: 1.1;
    }
    .pizza-desc {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 3px;
      font-style: italic;
      line-height: 1.4;
    }

    .songs-list {
      padding: 0 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .song-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      padding: 7px 10px;
      border-radius: 10px;
      background: var(--bg);
      cursor: pointer;
      transition: background .15s;
    }
    .song-item:hover { background: #F0DCC8; }
    .song-item .note { font-size: 1rem; flex-shrink: 0; }
    .song-item .artist { color: var(--muted); font-weight: 400; font-size: 0.8rem; margin-left: auto; flex-shrink: 0; }

    /* Color accents per category */
    .cat-rossa .card { border-color: #FFCCC8; }
    .cat-rossa .card-header { background: linear-gradient(135deg, #FFF0EE, #FFE0DC); }
    .cat-rossa .pizza-name { color: var(--red); }

    .cat-bianca .card { border-color: #D8EAF8; }
    .cat-bianca .card-header { background: linear-gradient(135deg, #EEF6FF, #DCF0FF); }
    .cat-bianca .pizza-name { color: var(--blue); }

    .cat-speciale .card { border-color: #D4F0E4; }
    .cat-speciale .card-header { background: linear-gradient(135deg, #EEFAF4, #D4F0E4); }
    .cat-speciale .pizza-name { color: var(--green); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #2C1A0E;
      color: white;
      padding: 12px 20px;
      border-radius: 24px;
      font-weight: 700;
      font-size: 0.9rem;
      z-index: 999;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      white-space: nowrap;
      max-width: 90vw;
      text-align: center;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    .no-results {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 1.1rem;
      display: none;
    }

    footer {

      padding: 24px;
      color: var(--muted);
      font-size: 0.8rem;
    }
  </style>
</head>

const emojis = {
  rosse: ["🍅","🌶️","🍕","🔥","🎶","👑","🌊","🍅"],
  bianche: ["✨","😢","🎠","🌸","🇮🇹","😭","🥗"],
  speciali: ["🎸","🐷","😤","🧀"]
};
const notes = ["🎵","🎶","🎸","🎤","🎹","🥁","🎺","🎻"];
 
let currentSearch = '';

function buildCards(category, items, catClass) {
  const emojiList = emojis[category];
  let html = '';
  items.forEach((pizza, i) => {
    const emoji = emojiList[i % emojiList.length];
    const songs = pizza.songs.map((s, si) => {
      const note = notes[si % notes.length];
      return `<div class="song-item" onclick="copySong('${escHtml(s.title)} - ${escHtml(s.artist)}')">
        <span class="note">${note}</span>
        <span>${escHtml(s.title)}</span>
        <span class="artist">${escHtml(s.artist)}</span>
      </div>`;
    }).join('');
    html += `<div class="card" data-cat="${category}" data-search="${pizza.name.toLowerCase()} ${pizza.songs.map(s=>s.title+' '+s.artist).join(' ').toLowerCase()}">
      <div class="card-header">
        <div class="pizza-emoji">${emoji}</div>
        <div class="card-title-wrap">
          <div class="pizza-name">${escHtml(pizza.name)}</div>
          <div class="pizza-desc">${escHtml(pizza.desc)}</div>
        </div>
      </div>
      <div class="songs-list">${songs}</div>
    </div>`;
  });
  return html;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function render() {
  const container = document.getElementById('main-content');
  let html = '';
  const sections = [
    { key: 'rosse', label: '🍅 Pizze Rosse', catClass: 'cat-rossa' },
    { key: 'bianche', label: '⚪ Pizze Bianche', catClass: 'cat-bianca' },
    { key: 'speciali', label: '⭐ Speciali', catClass: 'cat-speciale' },
  ];
  sections.forEach(sec => {
    html += `<div class="section ${sec.catClass}" data-section="${sec.key}">`;
    html += `<div class="section-title">${sec.label}</div>`;
    html += `<div class="grid">`;
    html += buildCards(sec.key, data[sec.key], sec.catClass);
    html += `</div></div>`;
  });
  container.innerHTML = html;
  applySearch();
}


function doSearch(val) {
  currentSearch = val.toLowerCase().trim();
  applySearch();
}

function applySearch() {
  const cards = document.querySelectorAll('.card');
  let visible = 0;
  cards.forEach(card => {
    const searchData = card.getAttribute('data-search') || '';
    if (!currentSearch || searchData.includes(currentSearch)) {
      card.style.display = '';
      visible++;
    } else {
      card.style.display = 'none';
    }
  });
  // Hide empty sections
  document.querySelectorAll('[data-section]').forEach(sec => {
    const anyVisible = [...sec.querySelectorAll('.card')].some(c => c.style.display !== 'none');
    sec.style.display = anyVisible ? '' : 'none';
  });
  document.getElementById('no-results').style.display = visible === 0 ? 'block' : 'none';
}

function copySong(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast('📋 Copiato: ' + text));
  } else {
    showToast('🎤 ' + text);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

render();
